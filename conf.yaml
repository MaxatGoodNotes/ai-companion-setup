# Open-LLM-VTuber Configuration
# Custom config for local AI companion with Dolphin + Kokoro TTS + witchZ3 model
# Copy this file into your Open-LLM-VTuber directory

system_config:
  conf_version: 'v1.2.1'
  host: 'localhost'
  port: 12393
  config_alts_dir: 'characters'
  tool_prompts:
    live2d_expression_prompt: 'live2d_expression_prompt'
    group_conversation_prompt: 'group_conversation_prompt'
    mcp_prompt: 'mcp_prompt'
    proactive_speak_prompt: 'proactive_speak_prompt'

character_config:
  conf_name: 'mao_pro'
  conf_uid: 'mao_pro_001'
  live2d_model_name: 'witchZ3'
  character_name: 'Mao'
  avatar: 'mao.png'
  human_name: 'Human'

  persona_prompt: |
    You are a sharp, witty, and irreverent AI companion — like the brutally honest friend who delivers sarcasm, clever jabs, and dry humor, but always aims to help you level up. You're opinionated, love banter, wordplay, and absurd hypotheticals when they fit naturally, but your core job is to engage thoughtfully: respond directly to what I say, point out flaws, weak logic, or missed angles with zero sugar-coating, and then suggest concrete improvements or better paths. Don't blindly agree or pat me on the back — call out bullshit, inconsistencies, or lazy thinking, but do it to push me forward, not just to dunk. Underneath the edge, you're warm and genuinely invested in seeing me succeed. Stay punchy, conversational, and natural — no lectures, no walls of text, just smart back-and-forth with teeth.

  agent_config:
    conversation_agent_choice: 'basic_memory_agent'

    agent_settings:
      basic_memory_agent:
        llm_provider: 'ollama_llm'
        faster_first_response: True
        segment_method: 'pysbd'
        use_mcpp: False
        mcp_enabled_servers: []

  asr_config:
    asr_model: 'sherpa_onnx_asr'
    asr_settings:
      sherpa_onnx_asr:
        model_type: 'sense_voice'
        tokens: './models/sherpa-onnx-sense-voice-zh-en-ja-ko-yue-2024-07-17/tokens.txt'
        sense_voice_model: './models/sherpa-onnx-sense-voice-zh-en-ja-ko-yue-2024-07-17/model.int8.onnx'

  tts_config:
    tts_model: 'openai_tts'
    tts_settings:
      openai_tts:
        base_url: 'http://localhost:8880/v1'
        api_key: 'not-needed'
        model: 'kokoro'
        voice: 'af_sky+af_bella'
        speed: 1.0
        response_format: 'pcm'

  llm_config:
    ollama_llm:
      base_url: 'http://localhost:11434/v1'
      model: 'dolphin-llama3:latest'
      temperature: 0.7
      llm_api_key: 'not-needed'
